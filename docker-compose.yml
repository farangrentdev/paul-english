services:
  app:
    build: .
    expose:
      - "3000"
    environment:
      DATABASE_URL: "file:/data/app.db"
      AUTH_SECRET: "${AUTH_SECRET:?set AUTH_SECRET}"
      AUTH_TRUST_HOST: "true"
      APP_URL: "${APP_URL:-https://paul-english.ru}"
      YOOKASSA_SHOP_ID: "${YOOKASSA_SHOP_ID:-}"
      YOOKASSA_SECRET_KEY: "${YOOKASSA_SECRET_KEY:-}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@pavelenglish.ru}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-admin12345}"
    volumes:
      - pavel_data:/data
      - pavel_uploads:/app/public/uploads
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-paul-english.ru}"
      EMAIL: "${LETSENCRYPT_EMAIL:-admin@pavelenglish.ru}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pavel_data:
  pavel_uploads:
  caddy_data:
  caddy_config:
